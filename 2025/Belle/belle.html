
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery with Images & Videos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Belle: a dog's life</h1>
    </header>

    <main class="gallery">
        <!-- Images -->
        <img src="images/photo1.jpg" alt="Photo 1">
        <img src="images/photo2.jpg" alt="Photo 2">

        <!-- Videos -->
        <video src="videos/video1.mp4" muted></video>
       
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="hidden">
        <span id="close">&times;</span>
        <span id="prev" class="nav">&#10094;</span>

        <!-- Media containers -->
        <img id="lightbox-img" class="hidden" alt="Large view">
        <video id="lightbox-video" class="hidden" controls></video>

        <span id="next" class="nav">&#10095;</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
